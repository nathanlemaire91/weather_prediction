name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

      build_lambda:
        description: 'Build Lambda function'
        required: true
        default: 'true'
        type: choice
        options:
          - true
          - false
  
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy_lambda:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_lambda == 'true' }}
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v3

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Build Lambda function
        working-directory: model/predict
        run: |
          pip install -r requirements.txt -t python/lib/python3.12/site-packages/
          zip -r lambda_function.zip python *.py
          aws s3 cp lambda_function.zip s3://${{ vars.S3_BUCKET_NAME }}/lambdas/weather-prediction.zip

  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: deploy_lambda
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v3

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - uses: hashicorp/setup-terraform@v2
      
      - run: terraform init

      - run: terraform plan -out=tfplan -var "rds_db_password=${{ secrets.RDS_DB_PASSWORD }}"
      
      - run: terraform apply -auto-approve "tfplan"
