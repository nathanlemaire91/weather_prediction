name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

      build_image:
        description: 'Build Docker image'
        required: true
        default: 'true'
        type: choice
        options:
          - true
          - false
  
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy_image:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_image == 'true' }}
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        working-directory: model/predict
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: weather-prediction/weather-prediction
          IMAGE_TAG: ${{ github.sha }}
          LATEST_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:$LATEST_TAG .
          docker push $REGISTRY/$REPOSITORY --all-tags

  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: deploy_image
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v3

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      - uses: hashicorp/setup-terraform@v2
      
      - run: terraform init

      - run: terraform plan -out=tfplan -var "rds_db_password=${{ secrets.RDS_DB_PASSWORD }}" -var "image_tag=${{ github.sha }}"
      
      - run: terraform apply -auto-approve "tfplan"
